services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  api:
    build: .
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      INNGEST_DEV: "1"
      INNGEST_API_BASE: http://inngest:8288
      INNGEST_EVENT_API_BASE: http://inngest:8288
      QDRANT_URL: http://qdrant:6333
    volumes:
      - .:/app
      - /app/.venv
      - ./uploads:/app/uploads
    depends_on:
      - qdrant

  inngest:
    image: inngest/inngest:latest
    working_dir: /app
    command: inngest dev --host 0.0.0.0 --port 8288 -u http://api:8000/api/inngest
    ports:
      - "8288:8288"
      - "8289:8289"
    depends_on:
      - api

  streamlit:
    build: .
    command: uv run streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      INNGEST_DEV: "1"
      INNGEST_API_BASE: http://inngest:8288
      INNGEST_EVENT_API_BASE: http://inngest:8288
      QDRANT_URL: http://qdrant:6333
    volumes:
      - .:/app
      - /app/.venv
      - ./uploads:/app/uploads
    depends_on:
      - inngest
      - qdrant
